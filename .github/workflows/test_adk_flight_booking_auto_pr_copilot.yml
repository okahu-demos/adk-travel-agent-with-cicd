name: (Deprecated) Test Flight Booking - Copilot + Monocle

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install python-dotenv
        pip install -r requirements.txt
        pip install -r tests/requirements.txt

    - name: Run test_adk_flight_booking.py
      id: test
      continue-on-error: true
      env:
        OKAHU_API_KEY: ${{ secrets.OKAHU_API_KEY }}
        OKAHU_INGESTION_ENDPOINT: ${{ secrets.OKAHU_INGESTION_ENDPOINT }}
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        GOOGLE_CLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT }}
        GOOGLE_CLOUD_LOCATION: ${{ secrets.GOOGLE_CLOUD_LOCATION }}
        GOOGLE_GENAI_MODEL: ${{ secrets.GOOGLE_GENAI_MODEL }}
        GOOGLE_GENAI_USE_VERTEXAI: ${{ secrets.GOOGLE_GENAI_USE_VERTEXAI }}
        MONOCLE_EXPORTER: ${{ secrets.MONOCLE_EXPORTER }}
      run: |
        set -o pipefail
        pytest tests/test_adk_flight_booking.py -v 2>&1 | tee test_output.txt
        echo "test_exit_code=$?" >> $GITHUB_OUTPUT

    - name: Collect Monocle JSON files
      if: steps.test.outcome == 'failure' || steps.test.outputs.test_exit_code != '0'
      run: |
        find .monocle tests/.monocle -name "*.json" -type f 2>/dev/null | head -20 > monocle_files.txt || echo "No JSON files found"
        if [ -s monocle_files.txt ]; then
          echo "Found $(wc -l < monocle_files.txt) JSON file(s):"
          cat monocle_files.txt
        else
          echo "No JSON files found in .monocle/ or tests/.monocle/"
          echo "No JSON files found" > monocle_files.txt
        fi

    - name: Create GitHub Issue on Test Failure
      id: create_issue
      if: steps.test.outcome == 'failure' || steps.test.outputs.test_exit_code != '0'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        cat > issue_body.md << 'EOF'
        ## Test Failure: test_adk_flight_booking.py

        The test workflow `test_adk_flight_booking_auto_pr_copilot.yml` failed.

        ### Workflow Error Output

        ```
        EOF
        if [ -f test_output.txt ]; then
          cat test_output.txt >> issue_body.md
        else
          echo "Test output not available" >> issue_body.md
        fi
        cat >> issue_body.md << 'EOF'
        ```

        ### Monocle Trace JSON Files

        The following JSON files were found in `.monocle/` and `tests/.monocle/`:

        EOF
        if [ -f monocle_files.txt ] && [ -s monocle_files.txt ] && ! grep -q "^No JSON" monocle_files.txt; then
          echo "#### Collected Files:" >> issue_body.md
          cat monocle_files.txt >> issue_body.md
          echo "" >> issue_body.md
          for json_file in $(cat monocle_files.txt | head -5); do
            if [ -f "$json_file" ]; then
              echo "#### \`$json_file\`" >> issue_body.md
              echo '```json' >> issue_body.md
              head -c 50000 "$json_file" >> issue_body.md || cat "$json_file" >> issue_body.md
              echo '```' >> issue_body.md
              echo "" >> issue_body.md
            fi
          done
          total_count=$(wc -l < monocle_files.txt)
          if [ "$total_count" -gt 5 ]; then
            echo "> Note: $total_count JSON file(s) found. Only the first 5 are shown above." >> issue_body.md
            echo "" >> issue_body.md
          fi
        else
          echo "No JSON files found in `.monocle/` or `tests/.monocle/` directories." >> issue_body.md
          echo "" >> issue_body.md
        fi
        cat >> issue_body.md << 'EOF'

        ### Action Required

        **PROMPT:** Fix the code based on workflow output of failed test and the monocle trace json output. Then rerun the test `tests/test_adk_flight_booking.py` again until pass.

        ---

        *This issue was automatically created by the GitHub Actions workflow (Copilot).*
        EOF
        TITLE="Test Failure: test_adk_flight_booking.py - $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
        ISSUE_URL=$(gh issue create --title "$TITLE" --body-file issue_body.md)
        echo "Created issue: $ISSUE_URL"
        ISSUE_NUM=$(echo "$ISSUE_URL" | sed -n 's|.*/issues/\([0-9]*\)|\1|p')
        echo "issue_number=$ISSUE_NUM" >> $GITHUB_OUTPUT

    - name: Assign copilot (gh CLI)
      if: steps.test.outcome == 'failure' || steps.test.outputs.test_exit_code != '0'
      env:
        GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      continue-on-error: true
      run: |
        ISSUE="${{ steps.create_issue.outputs.issue_number }}"
        gh issue edit "$ISSUE" --add-assignee "@copilot"

    - name: Upload Monocle JSON files as artifact
      if: steps.test.outcome == 'failure' || steps.test.outputs.test_exit_code != '0'
      continue-on-error: true
      uses: actions/upload-artifact@v4
      with:
        name: monocle-json-files
        path: |
          .monocle/**/*.json
          tests/.monocle/**/*.json
        if-no-files-found: ignore

    - name: Fail job if test failed
      if: steps.test.outcome == 'failure' || steps.test.outputs.test_exit_code != '0'
      run: |
        echo "Test failed. GitHub issue has been created and Copilot assigned."
        exit 1
