name: (Deprecated) Test Flight Booking - Claude + Monocle

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install python-dotenv
        pip install -r requirements.txt
        pip install -r tests/requirements.txt
        
    - name: Run test_adk_flight_booking.py
      id: test
      continue-on-error: true
      env:
        OKAHU_API_KEY: ${{ secrets.OKAHU_API_KEY }}
        OKAHU_INGESTION_ENDPOINT: ${{ secrets.OKAHU_INGESTION_ENDPOINT }}
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        GOOGLE_CLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT }}
        GOOGLE_CLOUD_LOCATION: ${{ secrets.GOOGLE_CLOUD_LOCATION }}
        GOOGLE_GENAI_MODEL: ${{ secrets.GOOGLE_GENAI_MODEL }}
        GOOGLE_GENAI_USE_VERTEXAI: ${{ secrets.GOOGLE_GENAI_USE_VERTEXAI }}
        MONOCLE_EXPORTER: ${{ secrets.MONOCLE_EXPORTER }}
      run: |
        set -o pipefail
        pytest tests/test_adk_flight_booking.py -v 2>&1 | tee test_output.txt
        echo "test_exit_code=$?" >> $GITHUB_OUTPUT
        
    - name: Collect Monocle JSON files
      if: steps.test.outcome == 'failure' || steps.test.outputs.test_exit_code != '0'
      run: |
        # Search for JSON files in .monocle/ and tests/.monocle/ directories
        find .monocle tests/.monocle -name "*.json" -type f 2>/dev/null | head -20 > monocle_files.txt || echo "No JSON files found"
        
        # Verify we found files
        if [ -s monocle_files.txt ]; then
          echo "Found $(wc -l < monocle_files.txt) JSON file(s):"
          cat monocle_files.txt
        else
          echo "No JSON files found in .monocle/ or tests/.monocle/"
          echo "No JSON files found" > monocle_files.txt
        fi
        
    - name: Create GitHub Issue on Test Failure
      if: steps.test.outcome == 'failure' || steps.test.outputs.test_exit_code != '0'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Prepare issue body
        cat > issue_body.md << 'EOF'
        ## Test Failure: test_adk_flight_booking.py
        
        The test workflow `test_adk_flight_booking_auto_pr.yml` failed.
        
        ### Workflow Error Output
        
        ```
        EOF
        
        # Add test output
        if [ -f test_output.txt ]; then
          cat test_output.txt >> issue_body.md
        else
          echo "Test output not available" >> issue_body.md
        fi
        
        cat >> issue_body.md << 'EOF'
        ```
        
        ### Monocle Trace JSON Files
        
        The following JSON files were found in `.monocle/` and `tests/.monocle/`:
        
        EOF
        
        # List collected JSON files
        # Check if file exists, is not empty, and doesn't start with "No JSON"
        if [ -f monocle_files.txt ] && [ -s monocle_files.txt ] && ! grep -q "^No JSON" monocle_files.txt; then
          echo "#### Collected Files:" >> issue_body.md
          cat monocle_files.txt >> issue_body.md
          echo "" >> issue_body.md
          
          # Add JSON file contents as code blocks
          file_count=0
          for json_file in $(cat monocle_files.txt | head -5); do
            if [ -f "$json_file" ]; then
              file_count=$((file_count + 1))
              echo "#### \`$json_file\`" >> issue_body.md
              echo '```json' >> issue_body.md
              # Limit file size to avoid hitting GitHub API limits (max ~65KB for issue body)
              head -c 50000 "$json_file" >> issue_body.md || cat "$json_file" >> issue_body.md
              echo '```' >> issue_body.md
              echo "" >> issue_body.md
            fi
          done
          
          # If there are more files, mention them
          total_count=$(wc -l < monocle_files.txt)
          if [ "$total_count" -gt 5 ]; then
            echo "> Note: $total_count JSON file(s) found. Only the first 5 are shown above. Check the repository's `.monocle/` and `tests/.monocle/` directories for all files." >> issue_body.md
            echo "" >> issue_body.md
          fi
        else
          echo "No JSON files found in `.monocle/` or `tests/.monocle/` directories." >> issue_body.md
          echo "" >> issue_body.md
        fi
        
        cat >> issue_body.md << 'EOF'
        
        ### Action Required
        
        **PROMPT:** Run okahu eval and use the right eval to gather information about the error before code fix. Use that information for code fix later. Fix the code based on workflow output of failed test and the monocle trace json output. Then rerun the test `tests/test_adk_flight_booking.py` again until pass. Finally, run another okahu eval and report back the final results.
        
        ---
        
        *This issue was automatically created by the GitHub Actions workflow.*
        EOF
        
        # Create the issue
        TITLE="Test Failure: test_adk_flight_booking.py - $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
        ISSUE_URL=$(gh issue create --title "$TITLE" --body-file issue_body.md)
        echo "Created issue: $ISSUE_URL"
        # Extract issue number for later use
        ISSUE_NUM=$(echo "$ISSUE_URL" | sed -n 's|.*/issues/\([0-9]*\)|\1|p')
        echo "ISSUE_NUM=$ISSUE_NUM" >> $GITHUB_ENV

    # --- Assign agent (best-effort; may fail in CI) ---
    # GITHUB_TOKEN: "target repository is not writable" (replaceActorsForAssignable).
    # PAT (GH_PAT): "Resource not accessible by personal access token" — agent assignment may be UI/App-only.
    - name: Assign anthropic-code-agent (gh CLI)
      if: steps.test.outcome == 'failure' || steps.test.outputs.test_exit_code != '0'
      env:
        GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      continue-on-error: true
      run: |
        gh issue edit $ISSUE_NUM --add-assignee "anthropic-code-agent"

    - name: Upload Monocle JSON files as artifact
      if: steps.test.outcome == 'failure' || steps.test.outputs.test_exit_code != '0'
      continue-on-error: true
      uses: actions/upload-artifact@v4
      with:
        name: monocle-json-files
        path: |
          .monocle/**/*.json
          tests/.monocle/**/*.json
        if-no-files-found: ignore
        
    - name: Fail job if test failed
      if: steps.test.outcome == 'failure' || steps.test.outputs.test_exit_code != '0'
      run: |
        echo "Test failed. GitHub issue has been created."
        exit 1
