name: Kahu SRE Agent

on:
  issue_comment:
    types: [created, edited]

permissions:
  contents: read
  issues: write

jobs:
  kahu:
    runs-on: ubuntu-latest
    if: |
      (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@kahu-agent'))
      )

    steps:
    - name: Check org membership
      id: auth
      env:
        GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        SENDER: ${{ github.event.sender.login }}
        ORG: ${{ github.repository_owner }}
      run: |
        set -euo pipefail
        STATUS=$(gh api "orgs/${ORG}/members/${SENDER}" --silent -i 2>&1 | head -1 | grep -oE '[0-9]{3}' || echo "404")
        if [ "$STATUS" = "204" ]; then
          echo "allowed=true" >> "$GITHUB_OUTPUT"
        else
          echo "Sender ${SENDER} is not a member of ${ORG} (HTTP ${STATUS})"
          echo "allowed=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Checkout code
      if: steps.auth.outputs.allowed == 'true'
      uses: actions/checkout@v4

    - name: Set up Python
      if: steps.auth.outputs.allowed == 'true'
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Extract @kahu-agent query
      if: steps.auth.outputs.allowed == 'true'
      id: extract
      env:
        COMMENT_BODY: ${{ github.event.comment.body }}
      run: |
        set -euo pipefail
        QUERY=$(echo "$COMMENT_BODY" | sed -n 's/.*@kahu-agent[[:space:]]*//p' | head -1)
        if [ -z "$QUERY" ]; then
          QUERY="investigate this issue"
        fi
        printf 'query=%s\n' "$QUERY" >> "$GITHUB_OUTPUT"

    - name: Resolve traces via Kahu
      if: steps.auth.outputs.allowed == 'true'
      id: traces
      env:
        OKAHU_API_KEY: ${{ secrets.OKAHU_API_KEY }}
        APP: ${{ secrets.CICD_OKAHU_APP_NAME }}
        QUERY: ${{ steps.extract.outputs.query }}
      run: python scripts/kahu_resolve_traces.py

    - name: Call Kahu SRE Agent
      if: steps.auth.outputs.allowed == 'true'
      id: kahu
      env:
        OKAHU_API_KEY: ${{ secrets.OKAHU_API_KEY }}
        APP: ${{ secrets.CICD_OKAHU_APP_NAME }}
        QUERY: ${{ steps.extract.outputs.query }}
        TRACE_IDS: ${{ steps.traces.outputs.trace_ids }}
      run: python scripts/kahu_call_agent.py

    - name: Post SRE Agent response as comment
      if: steps.auth.outputs.allowed == 'true'
      env:
        GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        AGENT_RESPONSE: ${{ steps.kahu.outputs.response }}
        ISSUE_NUMBER: ${{ github.event.issue.number }}
      run: |
        set -euo pipefail
        COMMENT_BODY="$(printf '### RESPONSE FROM KAHU\n\n%s\n\n---\n*Response from [Okahu SRE Agent](https://okahu.co)*' "$AGENT_RESPONSE")"
        gh issue comment "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --body "$COMMENT_BODY"
